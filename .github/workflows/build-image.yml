name: Build workspace image

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: images/workspace
          platforms: linux/amd64
          load: true
          tags: ghcr.io/pandysp/coder-workspace:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm ghcr.io/pandysp/coder-workspace:test bash -c "
            mise --version && pnpm --version && docker --version && tailscale --version &&
            rg --version | head -1 && fd --version | head -1 && gh --version | head -1 &&
            echo '✓ All tools present'
          "

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: pandysp
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: images/workspace
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/pandysp/coder-workspace:latest
            ghcr.io/pandysp/coder-workspace:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
