---
# System
swap_size: "4G"
swap_swappiness: 10

# Docker
docker_log_max_size: "10m"
docker_log_max_file: "3"

# Sysbox
sysbox_version: "0.7.0"
sysbox_enabled: true

# Coder
coder_dir: /opt/coder
coder_image: "ghcr.io/coder/coder:v2.31.7"
coder_postgres_image: "postgres:16-alpine"
coder_caddy_image: "caddy:2-alpine"
coder_domain: ""
cloudflare_api_token: ""

# GitHub External Auth (optional — requires a GitHub OAuth App)
github_oauth_client_id: ""
github_oauth_client_secret: ""

# Monitoring
monitoring_enabled: true
monitoring_dir: /opt/monitoring
monitoring_prometheus_retention: "15d"
monitoring_prometheus_retention_size: "5GB"
monitoring_grafana_admin_user: "admin"
monitoring_grafana_admin_password: ""
monitoring_alertmanager_webhook_url: ""
monitoring_loki_enabled: false
monitoring_loki_retention: "168h"
