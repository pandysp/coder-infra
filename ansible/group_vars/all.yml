---
# System
swap_size: "4G"
swap_swappiness: 10

# Docker
docker_log_max_size: "10m"
docker_log_max_file: "3"

# Sysbox
sysbox_version: "0.7.0"
sysbox_enabled: true

# Coder
coder_dir: /opt/coder
coder_image: "ghcr.io/coder/coder:v2.31.7"
coder_postgres_image: "postgres:16-alpine"
coder_caddy_image: "caddy:2-alpine"
coder_domain: ""
cloudflare_api_token: ""

# GitHub External Auth (optional — requires a GitHub OAuth App)
github_oauth_client_id: ""
github_oauth_client_secret: ""
