---
- name: Install Sysbox dependencies
  ansible.builtin.apt:
    name:
      - fuse
      - rsync
    state: present

- name: Check installed Sysbox version
  ansible.builtin.shell: dpkg-query -W -f='${Version}' sysbox-ce 2>/dev/null || echo "not-installed"
  register: sysbox_installed_version
  changed_when: false

- name: Set Sysbox install needed fact
  ansible.builtin.set_fact:
    sysbox_needs_install: "{{ sysbox_installed_version.stdout != sysbox_version + '-0' }}"

- name: Download Sysbox package
  ansible.builtin.get_url:
    url: "https://downloads.nestybox.com/sysbox/releases/v{{ sysbox_version }}/sysbox-ce_{{ sysbox_version }}-0.linux_amd64.deb"
    dest: /tmp/sysbox.deb
    mode: "0644"
  when: sysbox_needs_install

- name: Stop Docker before Sysbox install
  ansible.builtin.systemd:
    name: docker
    state: stopped
  when: sysbox_needs_install

- name: Install Sysbox
  ansible.builtin.apt:
    deb: /tmp/sysbox.deb
    state: present
  when: sysbox_needs_install

- name: Clean up Sysbox package
  ansible.builtin.file:
    path: /tmp/sysbox.deb
    state: absent

- name: Enable Sysbox services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - sysbox-mgr
    - sysbox-fs

- name: Start Docker after Sysbox install
  ansible.builtin.systemd:
    name: docker
    state: started
  when: sysbox_needs_install
