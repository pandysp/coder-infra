---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow all traffic on Tailscale interface
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in

- name: Allow SSH for provisioning
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow Docker containers to reach host services
  community.general.ufw:
    rule: allow
    from_ip: 172.16.0.0/12
    comment: "Docker bridge networks"

- name: Enable ufw
  community.general.ufw:
    state: enabled
